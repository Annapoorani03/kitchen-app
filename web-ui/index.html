<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Kitchen Dashboard</title><style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#f0f4f8;--surface:#fff;--primary:#e67e22;--dark:#1a3e72;--muted:#777;--radius:16px;--shadow:0 6px 20px rgba(0,0,0,0.08)}body{background:var(--bg);font-family:Segoe UI,sans-serif;color:#333;min-height:100vh;padding:24px 16px}.container{max-width:1100px;margin:0 auto}header{text-align:center;margin-bottom:32px}.logo{font-size:2.4rem;font-weight:800;color:var(--dark)}.logo span{color:var(--primary)}.tagline{color:var(--muted);font-size:.95rem;margin-top:4px}.menu-tabs{display:flex;justify-content:center;gap:12px;margin-bottom:32px;flex-wrap:wrap}.menu-tabs button{background:var(--surface);border:2px solid transparent;padding:10px 26px;border-radius:50px;cursor:pointer;font-weight:600;font-size:.95rem;color:var(--dark);transition:all .25s;box-shadow:var(--shadow)}.menu-tabs button:hover{border-color:var(--primary);color:var(--primary)}.menu-tabs button.active{background:var(--primary);color:#fff;border-color:var(--primary)}.menu-items{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:20px;margin-bottom:32px}.menu-card{background:var(--surface);border-radius:var(--radius);padding:22px 18px;box-shadow:var(--shadow);display:flex;flex-direction:column;align-items:center;gap:8px;transition:transform .25s;text-align:center}.menu-card:hover{transform:translateY(-5px)}.card-emoji{font-size:3rem}.menu-card h3{font-size:1.15rem;font-weight:700;color:var(--dark)}.stars{color:#f2b01e}.rating-num{color:var(--muted);font-size:.82rem}.price{font-weight:700;color:var(--dark)}.time-badge{background:#fff3e0;color:var(--primary);font-size:.78rem;font-weight:600;padding:3px 10px;border-radius:50px}.order-btn{margin-top:6px;background:var(--primary);color:#fff;border:none;padding:9px 22px;border-radius:50px;cursor:pointer;font-weight:600;font-size:.9rem;width:100%}.order-btn:hover{background:#d35400}.order-status{background:var(--surface);border-radius:var(--radius);padding:20px 24px;box-shadow:var(--shadow);text-align:center;min-height:80px;display:flex;align-items:center;justify-content:center}.status-idle{color:var(--muted)}.status-preparing{color:var(--dark);display:flex;flex-direction:column;gap:6px;align-items:center}.status-ready{color:#27ae60;display:flex;flex-direction:column;gap:6px;align-items:center}.est{font-size:.88rem;color:var(--muted)}.spin{display:inline-block;animation:spin 1s linear infinite}@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}</style></head><body><div class="container"><header><div class="logo">Kitchen<span>App</span></div><p class="tagline">Your smart kitchen companion</p></header><nav class="menu-tabs"><button data-time="morning" class="active">Morning</button><button data-time="noon">Noon</button><button data-time="evening">Evening</button></nav><section class="menu-items"></section><div class="order-status" id="order-status"><span class="status-idle">Select a dish to order</span></div></div><script>const menuData={morning:[{name:"Idli",emoji:"🍚",time:5,rating:4.5,reviews:30,price:"Rs.60"},{name:"Dosa",emoji:"🫓",time:8,rating:4.7,reviews:25,price:"Rs.80"},{name:"Pongal",emoji:"🍲",time:10,rating:4.6,reviews:20,price:"Rs.70"},{name:"Coffee",emoji:"☕",time:3,rating:4.8,reviews:40,price:"Rs.40"}],noon:[{name:"Meals",emoji:"🍱",time:10,rating:4.8,reviews:50,price:"Rs.120"},{name:"Biryani",emoji:"🍛",time:15,rating:4.9,reviews:60,price:"Rs.180"},{name:"Chapati",emoji:"🫓",time:8,rating:4.4,reviews:22,price:"Rs.90"},{name:"Juice",emoji:"🥤",time:3,rating:4.5,reviews:18,price:"Rs.50"}],evening:[{name:"Samosa",emoji:"🥟",time:5,rating:4.6,reviews:35,price:"Rs.30"},{name:"Bajji",emoji:"🧆",time:8,rating:4.5,reviews:28,price:"Rs.40"},{name:"Tea",emoji:"🍵",time:3,rating:4.7,reviews:45,price:"Rs.20"},{name:"Fried Rice",emoji:"🍳",time:12,rating:4.4,reviews:30,price:"Rs.130"}]};const menuSection=document.querySelector(".menu-items");const orderStatus=document.getElementById("order-status");const buttons=document.querySelectorAll(".menu-tabs button");buttons.forEach(btn=>{btn.addEventListener("click",()=>{buttons.forEach(b=>b.classList.remove("active"));btn.classList.add("active");loadMenu(btn.dataset.time)})});function loadMenu(time){menuSection.innerHTML="";menuData[time].forEach(item=>{const card=document.createElement("div");card.classList.add("menu-card");const stars=Math.floor(item.rating);card.innerHTML="<div class=card-emoji>"+item.emoji+"</div><h3>"+item.name+"</h3><div><span class=stars>"+"★".repeat(stars)+"☆".repeat(5-stars)+"</span> <span class=rating-num>"+item.rating+" ("+item.reviews+")</span></div><div><span class=price>"+item.price+"</span> <span class=time-badge>"+item.time+" min</span></div><button class=order-btn>Order Now</button>";card.querySelector(".order-btn").addEventListener("click",()=>placeOrder(item));menuSection.appendChild(card)})}function placeOrder(item){orderStatus.innerHTML="<div class=status-preparing><span class=spin>⏳</span><strong>"+item.emoji+" "+item.name+"</strong> Preparing...<div class=est>"+item.time+" min | "+item.price+"</div></div>";setTimeout(()=>{orderStatus.innerHTML="<div class=status-ready>🎉 <strong>"+item.emoji+" "+item.name+"</strong> Ready to serve!<div class=est>Enjoy your meal!</div></div>"},Math.min(item.time*800,5000))}loadMenu("morning")</script></body></html>

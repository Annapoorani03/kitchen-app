        .menu-tabs button {
          background-color: #d6e4ff;
          border: none;
          padding: 12px 25px;
          margin: 0 10px;
          border-radius: 12px;
          cursor: pointer;
          font-weight: 600;
          color: #1a3e72;
          transition: 0.3s;
          box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .menu-tabs button:hover,

    </head>
    <body>
      <div class="container">
        <header>
          <h1>Kitchen Dashboard</h1>
        </header>
        <nav class="menu-tabs">
          <button data-time="morning" class="active">Morning</button>
          <button data-time="noon">Noon</button>
          <button data-time="evening">Evening</button>
        </nav>
        <section class="menu-items"></section>
        <div class="order-status"></div>
      </div>
      <script>
        const menuData = {
          morning: [
            { name: "Pancakes", time: 10, rating: 4.5, reviews: 25 },
            { name: "Omelette", time: 7, rating: 4.7, reviews: 18 },
            { name: "Coffee", time: 5, rating: 4.8, reviews: 40 },
            { name: "Fruit Salad", time: 5, rating: 4.6, reviews: 22 }
          ],
          noon: [
            { name: "Grilled Sandwich", time: 12, rating: 4.2, reviews: 30 },
            { name: "Caesar Salad", time: 8, rating: 4.4, reviews: 22 },
            { name: "Lemonade", time: 3, rating: 4.6, reviews: 15 },
            { name: "Burger", time: 15, rating: 4.5, reviews: 35 }
          ],
          evening: [
            { name: "Pizza Slice", time: 15, rating: 4.8, reviews: 50 },
            { name: "French Fries", time: 10, rating: 4.5, reviews: 40 },
            { name: "Iced Tea", time: 5, rating: 4.3, reviews: 18 },
            { name: "Chocolate Muffin", time: 8, rating: 4.7, reviews: 27 }
          ]
        };
        const menuSection = document.querySelector('.menu-items');
        const orderStatus = document.querySelector('.order-status');
        const buttons = document.querySelectorAll('.menu-tabs button');
        buttons.forEach(btn => {
          btn.addEventListener('click', () => {
            buttons.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            loadMenu(btn.dataset.time);
          });
        });
        function loadMenu(time) {
          menuSection.innerHTML = '';
          menuData[time].forEach(item => {
            const card = document.createElement('div');
            card.classList.add('menu-card');
            card.innerHTML = `
              <h3>${item.name}</h3>
              <p class="stars">Rating: ${item.rating} ⭐ (${item.reviews} reviews)</p>
              <p>Click to order</p>
            `;
            card.addEventListener('click', () => displayOrderStatus(item));
            menuSection.appendChild(card);
          });
        }
        function displayOrderStatus(item) {
          orderStatus.innerHTML = `
            <strong>${item.name}</strong> - Preparing... ⏳<br>
            Estimated time: ${item.time} mins<br>
            ✅ Order Confirmed!
          `;
          setTimeout(() => {
            orderStatus.innerHTML = `
              <strong>${item.name}</strong> - Ready to Serve! 🎉<br>
              Enjoy your meal!
            `;
          }, item.time * 1000);
        }
        loadMenu('morning');
      </script>

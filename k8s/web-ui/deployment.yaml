apiVersion: v1
kind: ConfigMap
metadata:
  name: web-ui-config
  namespace: kitchen-app
data:
  nginx.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        location /api/ {
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_pass http://api:3000/;
        }

        location /health {
            return 200 'OK';
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }

  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
      <title>Kitchen Orders</title>
    </head>
    <body>
      <h1>Kitchen Orders</h1>

      <input id="dish" placeholder="Enter dish" />
      <button onclick="createOrder()">Create</button>

      <ul id="orders"></ul>

      <script>
        async function createOrder() {
          const dish = document.getElementById("dish").value;
          await fetch('/api/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ dish })
          });
          loadOrders();
        }

        async function loadOrders() {
          const res = await fetch('/api/orders');
          const data = await res.json();
          const list = document.getElementById("orders");
          list.innerHTML = '';
          data.forEach(o => {
            const li = document.createElement("li");
            li.textContent = o.dish + " - " + o.status;
            list.appendChild(li);
          });
        }

        loadOrders();
      </script>
    </body>
    </html>

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-ui-deployment
  namespace: kitchen-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kitchen-web-ui
  template:
    metadata:
      labels:
        app: kitchen-web-ui
    spec:
      containers:
      - name: web-ui
        image: nginx:alpine
        ports:
        - containerPort: 80
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: nginx.conf
        - name: config
          mountPath: /usr/share/nginx/html/index.html
          subPath: index.html
      volumes:
      - name: config
        configMap:
          name: web-ui-config

---
apiVersion: v1
kind: Service
metadata:
  name: web-ui-service
  namespace: kitchen-app
spec:
  type: NodePort
  selector:
    app: kitchen-web-ui
  ports:
  - port: 80
    targetPort: 80
    nodePort: 30080
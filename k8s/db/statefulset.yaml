apiVersion: v1
kind: Service
metadata:
  name: mongodb-service
  namespace: kitchen-app
spec:
  selector: { app: mongodb }
  ports: [{ port: 27017, targetPort: 27017 }]
  clusterIP: None
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: kitchen-app
spec:
  serviceName: mongodb-service
  replicas: 1
  selector: { matchLabels: { app: mongodb } }
  template:
    metadata: { labels: { app: mongodb } }
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports: [{ containerPort: 27017 }]
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom: { secretKeyRef: { name: mongodb-secret, key: mongo-root-username } }
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom: { secretKeyRef: { name: mongodb-secret, key: mongo-root-password } }
          volumeMounts:
            - name: mongodb-data
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - mongosh
                - --quiet
                - --username
                - admin
                - --password
                - Secret123!
                - --authenticationDatabase
                - admin
                - --eval
                - "db.adminCommand('ping').ok"
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 15
            failureThreshold: 5
          resources:
            requests: { memory: 256Mi, cpu: 100m }
            limits:   { memory: 512Mi, cpu: 500m }
  volumeClaimTemplates:
    - metadata: { name: mongodb-data }
      spec:
        accessModes: [ReadWriteOnce]
        resources: { requests: { storage: 1Gi } }

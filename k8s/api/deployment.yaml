apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: kitchen-app
spec:
  selector: { app: kitchen-api }
  ports: [{ port: 3000, targetPort: 3000 }]
---
apiVersion: v1
kind: Service
metadata:
  name: api-nodeport
  namespace: kitchen-app
spec:
  type: NodePort
  selector: { app: kitchen-api }
  ports: [{ port: 3000, targetPort: 3000, nodePort: 30000 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: kitchen-app
spec:
  replicas: 2
  selector: { matchLabels: { app: kitchen-api } }
  template:
    metadata: { labels: { app: kitchen-api } }
    spec:
      containers:
        - name: kitchen-api
          image: kitchen-api:local
          imagePullPolicy: Never
          ports: [{ containerPort: 3000 }]
          env:
            - name: PORT
              valueFrom: { configMapKeyRef: { name: api-config, key: PORT } }
            - name: MONGO_URI
              valueFrom: { secretKeyRef: { name: mongodb-secret, key: mongo-uri } }
          livenessProbe:
            httpGet: { path: /health, port: 3000 }
            initialDelaySeconds: 20
            periodSeconds: 15
          readinessProbe:
            httpGet: { path: /ready, port: 3000 }
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests: { memory: 128Mi, cpu: 100m }
            limits:   { memory: 256Mi, cpu: 500m }
